# Docker Compose 编排文件
# 用于本地开发环境

version: '3.8'

services:
  # 后端服务
  backend:
    build:
      context: ./led
      dockerfile: Dockerfile
    container_name: goview-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
      - DB_TYPE=sqlite
      - DB_PATH=/app/db/goview.db
      - JWT_SECRET=${JWT_SECRET:-goview-secret-key-dev}
    volumes:
      # 持久化数据库
      - backend-data:/app/db
      # 持久化上传文件
      - backend-uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/system/info"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - goview-network

  # 前端服务
  frontend:
    build:
      context: ./go-view
      dockerfile: Dockerfile
    container_name: goview-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - goview-network

volumes:
  # 数据库持久化
  backend-data:
    driver: local
  # 上传文件持久化
  backend-uploads:
    driver: local

networks:
  goview-network:
    driver: bridge
