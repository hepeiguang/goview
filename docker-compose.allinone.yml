# 前后端一体化 docker-compose
# 部署单个镜像，包含前端和后端服务

version: '3.8'

services:
  goview:
    build:
      context: .
      dockerfile: Dockerfile.allinone
    container_name: goview-allinone
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      - NODE_ENV=production
      - PORT=8080
      - DB_TYPE=sqlite
      - DB_PATH=/app/backend/db/goview.db
      - JWT_SECRET=${JWT_SECRET:-goview-secret-key-change-in-production}
    volumes:
      # 持久化数据库和上传文件
      - goview-data:/app/backend/db
      - goview-uploads:/app/backend/uploads
      # 持久化日志
      - goview-logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/system/info"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  goview-data:
    driver: local
  goview-uploads:
    driver: local
  goview-logs:
    driver: local
